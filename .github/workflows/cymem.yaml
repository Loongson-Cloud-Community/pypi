name: build cymem wheel

on:
  schedule:
    - cron: '0 17 * * *'
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/cymem.yaml"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/cymem.yaml"
  workflow_dispatch:
    inputs:
      version:
        required: false
        default: 'latest'
env:
  PACKAGE: cymem
jobs:
  check:
    name: Check if wheel exists
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check if exists
        id: Check
        run: |
          pkg=${{ env.PACKAGE }}

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="latest"
          fi

          url="https://lpypi.loongnix.cn/loongson/pypi/+simple/${pkg}/"
          upstream_url="https://pypi.org/pypi/${pkg}/json"

          if [[ "${version}" == "latest" ]]; then
            version="$(curl -s ${upstream_url} | jq -r '.info.version')"
          fi

          if curl -Ls ${url} | grep -q ${pkg}-${version}-.*loongarch64; then
            echo "build=false" >> $GITHUB_OUTPUT
            echo "${platform} wheels already exists."
          else
            echo "build=true" >> $GITHUB_OUTPUT
            echo "${platform} wheels not found, continue building"
          fi

          echo "VERSION=${version}" >> $GITHUB_OUTPUT

  build:
    needs: [check]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
    if: needs.check.outputs.build == 'true'

    steps:
      - name: Download source
        uses: Loongson-Cloud-Community/pypi@main
        with:
          name: ${{ env.PACKAGE }}
          version: ${{ env.VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheel
        uses: loong64/cibuildwheel@v3.3.1
        env:
          PIP_INDEX_URL: "https://lpypi.loongnix.cn/loongson/pypi/+simple"
          CIBW_ARCHS: "loongarch64"
          CIBW_ENVIRONMENT_PASS_LINUX: >
            PIP_INDEX_URL

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}-${{ github.sha }}-${{ matrix.os }}.zip
          path: ./wheelhouse/*.whl

  upload:
    needs: [build]
    runs-on: loongarch64-abi2.0
    if: needs.check.outputs.build == 'true' && github.event_name != 'pull_request'

    steps:
      - name: Clean workspace
        run: safe-rm -rf * .*

      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.PACKAGE }}-*
          merge-multiple: true
          path: dist

      - name: Upload wheels
        run: |
          ls dist/*.whl || exit 1
          pip install twine==6.0.1
          twine upload --repository-url https://lpypi.loongnix.cn/loongson/pypi dist/*.whl
        env:
          TWINE_USERNAME: ${{ secrets.INDEX_NAME }}
          TWINE_PASSWORD: ${{ secrets.INDEX_TOKEN }}
