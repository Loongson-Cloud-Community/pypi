name: build psycopg-binary wheel

on:
  schedule:
    - cron: '0 17 * * *'
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/psycopg-binary.yaml"
  workflow_dispatch:
    inputs:
      version:
        required: false
        default: 'latest'
env:
  PACKAGE: psycopg_binary
  REPOSITORY: psycopg/psycopg
  LIBPQ_VERSION: "18.0"
  OPENSSL_VERSION: "3.5.4"

jobs:
  check:
    name: Check if wheel exists
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check if exists
        id: Check
        run: |
          pkg=${{ env.PACKAGE }}

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="latest"
          fi
          url="https://lpypi.loongnix.cn/loongson/pypi/+simple/${pkg}/"
          upstream_url="https://pypi.org/pypi/${pkg}/json"

          if [[ "${version}" == "latest" ]]; then
            version="$(curl -s ${upstream_url} | jq -r '.info.version')"
          fi

          if curl -Ls ${url} | grep -q ${pkg}-${version}-.*loongarch64; then
            echo "build=false" >> $GITHUB_OUTPUT
            echo "${platform} wheels already exists."
          else
            echo "build=true" >> $GITHUB_OUTPUT
            echo "${platform} wheels not found, continue building"
          fi

          echo "VERSION=${version}" >> $GITHUB_OUTPUT

  build:
    needs: [check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        platform: [manylinux, musllinux]
        pyver: [cp310, cp311, cp312, cp313, cp314]
    if: needs.check.outputs.build == 'true'

    steps:
      - name: Download source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPOSITORY }}
          ref: ${{ needs.check.outputs.version }}

      - name: Create the binary package source tree
        run: python3 ./tools/ci/copy_to_binary.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheel
        uses: loong64/cibuildwheel@v3.3.1
        with:
          package-dir: psycopg_binary
        env:
          PIP_INDEX_URL: "https://lpypi.loongnix.cn/loongson/pypi/+simple"
          CIBW_ARCHS: "loongarch64"
          CIBW_BUILD: "${{ matrix.pyver }}-${{ matrix.platform }}_loongarch64"
          CIBW_BEFORE_ALL_LINUX: |
            if command -v yum >/dev/null 2>&1; then
              source /etc/os-release && 
              sed -i "s/centos/$ID/g" tools/ci/build_libpq.sh &&
              sed -i "s/pam-devel/pam-devel perl/g" tools/ci/build_libpq.sh &&
              sed -i "s/centos/$ID/g" tools/ci/print_so_versions.sh &&
              sed -i "/build_libpq.sh/s| > /dev/null||" tools/ci/wheel_linux_before_all.sh &&
              sed -i "s/centos/$ID/g" tools/ci/wheel_linux_before_all.sh
            fi
            ./tools/ci/wheel_linux_before_all.sh
          CIBW_REPAIR_WHEEL_COMMAND: >-
            export LD_LIBRARY_PATH="$LIBPQ_BUILD_PREFIX/lib:$LIBPQ_BUILD_PREFIX/lib64"
            && ./tools/ci/strip_wheel.sh {wheel}
            && auditwheel repair -w {dest_dir} {wheel}
          CIBW_TEST_SKIP: "*"
          CIBW_ENVIRONMENT_PASS_LINUX: LIBPQ_VERSION OPENSSL_VERSION PIP_INDEX_URL
          CIBW_ENVIRONMENT: >-
            PACKAGE_IMPL=binary
            LIBPQ_BUILD_PREFIX=/host/tmp/libpq.build
            PATH="$LIBPQ_BUILD_PREFIX/bin:$PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE }}-${{ matrix.pyver }}-${{ matrix.platform }}_loongarch64
          path: ./wheelhouse/*.whl

  upload:
    needs: [build]
    runs-on: loongarch64-abi2.0
    if: needs.check.outputs.build == 'true' && github.event_name != 'pull_request'

    steps:
      - name: Clean workspace
        run: safe-rm -rf * .*

      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.PACKAGE }}-*
          merge-multiple: true
          path: dist

      - name: Upload wheels
        run: |
          ls dist/*.whl || exit 1
          pip install twine==6.0.1
          twine upload --repository-url https://lpypi.loongnix.cn/loongson/pypi dist/*.whl
        env:
          TWINE_USERNAME: ${{ secrets.INDEX_NAME }}
          TWINE_PASSWORD: ${{ secrets.INDEX_TOKEN }}
